services:
  postgres:
    image: postgres:16
    container_name: ppm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ppm
      POSTGRES_USER: ppm_user
      POSTGRES_PASSWORD: ppm_pass123
    ports:
      - "5433:5432"
    volumes:
      - ppm_postgres_data:/var/lib/postgresql/data

volumes:
  ppm_postgres_data:
